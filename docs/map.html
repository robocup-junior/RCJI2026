<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map - RCJI 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        h1 {
            margin-top: 2rem;
            margin-bottom: 2rem;
        }
        .map-container {
            width: 95%;
            max-width: 1200px;
            margin: auto;
        }
        .map-container img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .home-link {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            color: #333;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <a href="index.html" class="home-link"><i class="fas fa-home"></i></a>
    <h1>Venue Map</h1>
    <div class="map-container">
        <img src="2nd_Floor.pdf.jpg" alt="Venue Map">
    </div>
</body>
</html>
